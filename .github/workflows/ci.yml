name: Laravel CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: camwater_db_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1. Récupération du code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installation PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, bcmath

      # 3. Cache Composer (accélération)
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}

      # 4. Installation dépendances
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # 5. Audit sécurité dépendances
      - name: Security audit (Composer)
        run: composer audit || true

      # 6. Correction automatique du code (évite échec Pint)
      - name: Fix code style (Laravel Pint)
        run: ./vendor/bin/pint


      # 7. Préparation environnement Laravel
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # 8. Configuration base de données
      - name: Configure DB
        run: |
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=camwater_db_testing" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env

      # 9. Attendre MySQL
      - name: Wait for MySQL
        run: sleep 10

      # 10. Cache Laravel
      - name: Build application cache
        run: |
          php artisan config:clear
          php artisan cache:clear

      # 11. Migrations
      - name: Run migrations
        run: php artisan migrate:fresh --force

      # 12. Tests
      - name: Run tests
        run: php artisan test

